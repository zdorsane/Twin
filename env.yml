name: TwinCell
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  # Core scientific stack
  - numpy
  - scipy
  - pandas
  - scikit-learn

  # Chemistry / drug discovery
  - rdkit

  # System utilities
  - tqdm
  - joblib

  # Optional plotting (safe for pipelines)
  - matplotlib

  # Notebook support
  - jupyter

  # pip packages (important for TensorFlow ecosystem)
  - pip:
      # Deep learning stack (GPU-enabled via NVIDIA wheels)
      - tensorflow==2.21.0
      - tensorflow-probability==0.25.0

      # NVIDIA CUDA runtime wheels (needed for TF GPU)
      - nvidia-cublas-cu12
      - nvidia-cuda-runtime-cu12
      - nvidia-cuda-nvrtc-cu12
      - nvidia-cudnn-cu12
      - nvidia-cufft-cu12
      - nvidia-curand-cu12
      - nvidia-cusolver-cu12
      - nvidia-cusparse-cu12
      - nvidia-nccl-cu12
      - nvidia-nvjitlink-cu12

      # Utilities used in your script
      - protobuf
      - absl-py
      - h5py
      - requests
      - pubchempy

      # SELFIES molecular representation
      - selfies